<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Game</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;  /* Центрирование по горизонтали */
            align-items: center;      /* Центрирование по вертикали */
            background-color: #f0f0f0; /* Фоновый цвет */
        }

        h1 {
            font-size: 2rem;
            color: #333;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div>
        <h1 id="text">Press the button</h1>
        <button onclick="changeText()">Click Me</button>
    </div>

    <script>
        function changeText() {
            document.getElementById('text').textContent = 'You pressed the button!';
        }
    </script>

</body>
</html>
